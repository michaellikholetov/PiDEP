<!DOCTYPE html>

<body>

  <header class="header">
    <a class="logo" href="index.html">
      <img src="pictures/logo.png" alt="логотип" />
    </a>

      <a class="shop_button nav_btn" href="shop.html">Магазин</a>

  <main class="background">

        <a class="side_banner" href="login.html">
          <img src="pictures/side_banner.png" alt="боковой баннер" />
        </a>

        <a class="central_banner" href="login.html">
          <img src="pictures/central_banner.png" alt="центральный баннер" />
        </a>
        
<div class="team_slider" aria-label="Team slider">

  <input class="s_ctrl" type="radio" name="team" id="s1" checked>
  <input class="s_ctrl" type="radio" name="team" id="s2">

  <div class="team_viewport">
    <div class="team_track">
      <img class="team_slide" src="pictures/me.png" alt="Основатель">
      <img class="team_slide" src="pictures/me-also.png" alt="Главный разработчик">
    </div>
  </div>

  <div class="team_controls">
    <label class="slider_btn prev p1" for="s3" aria-label="Previous slide">‹</label>
    <label class="slider_btn next n1" for="s2" aria-label="Next slide">›</label>

    <label class="slider_btn prev p2" for="s1" aria-label="Previous slide">‹</label>
    <label class="slider_btn next n2" for="s3" aria-label="Next slide">›</label>
  </div>
</div>
      </section>

      <section class="games_section">
        <h2 class="section_title">Онлайн игры</h2>

        <div class="games_grid">
          <a class="game_card" href="login.html">
            <img src="pictures/poker.png" alt="Покер" />
            <div class="game_label">Покер</div>
          </a>

          <a class="game_card" href="login.html">
            <img src="pictures/blackjack.png" alt="Блэк-джек" />
            <div class="game_label">Блэк-джек</div>
          </a>

          <a class="game_card" href="login.html">
            <img src="pictures/ruletka.png" alt="Рулетка" />
            <div class="game_label">Рулетка</div>
          </a>

          <a class="game_card" href="login.html">
            <img src="pictures/slots.jpg" alt="Слоты" />
            <div class="game_label">Слоты</div>
          </a>
        </div>
      </section>

      <section class="games_section">
        <h2 class="section_title">Одиночные игры</h2>

        <div class="games_grid">
          <a class="game_card" href="login.html">
            <img src="pictures/poker_computer.png" alt="Покер" />
            <div class="game_label">Покер</div>
          </a>

          <a class="game_card" href="login.html">
            <img src="pictures/blackjack_computer.png" alt="Блэк-джек" />

          </a>

          <a class="game_card" href="login.html">
            <img src="pictures/ruletka_single.png" alt="Рулетка" />
            <div class="game_label">Рулетка</div>
          </a>

          <a class="game_card" href="login.html">
            <img src="pictures/slots_single.png" alt="Слоты" />
            <div class="game_label">Слоты</div>
          </a>
        </div>
      </section>
