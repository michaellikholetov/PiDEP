    <nav class="right_nav">
      <a class="profile_button nav_btn" href="profile.html">Профиль</a>
    </nav>
  </header>

<main class="background">
  <div class="container">
    <section class="profile_card" aria-labelledby="privacyTitle">
      <h1 class="profile_title" id="privacyTitle">Настройки приватности</h1>

      <form class="profile_form" action="#" method="post">
        <div class="form_group">
          <label for="profileVisibility">Видимость профиля</label>
          <select class="input_field" id="profileVisibility" name="profile_visibility">
            <option value="public">Виден всем</option>
            <option value="users" selected>Только авторизованным</option>
            <option value="private">Только мне</option>
          </select>
        </div>

        <div class="form_group">
          <label>
            <input type="checkbox" name="show_online_status" checked>
            Показывать статус «онлайн»
          </label>
          <label>
            <input type="checkbox" name="show_game_activity" checked>
            Показывать игровую активность
          </label>
        </div>

        <div class="form_group">
          <label>Коммуникации</label>
          <label>
            <input type="checkbox" name="email_marketing">
            Получать письма об акциях и бонусах
          </label>
          <label>
            <input type="checkbox" name="sms_marketing">
            Получать SMS-уведомления
          </label>
        </div>

        <div class="form_group">
          <label>Передача данных</label>
          <label>
            <input type="checkbox" name="share_with_providers" checked>
            Разрешить передачу технических данных провайдерам игр (для работы игр)
          </label>
          <label>
            <input type="checkbox" name="share_for_analytics" checked>
            Разрешить анонимную аналитику для улучшения сервиса
          </label>
        </div>

        <div class="form_group">
          <label>Cookie</label>
          <label>
            <input type="checkbox" name="cookie_required" checked disabled>
            Обязательные cookie (нельзя отключить)
          </label>
          <label>
            <input type="checkbox" name="cookie_analytics" checked>
            Аналитические cookie
          </label>
          <label>
            <input type="checkbox" name="cookie_marketing">
            Маркетинговые cookie
          </label>
        </div>

        <div class="form_group">
          <label for="dataExportEmail">Экспорт данных</label>
          <input
            class="input_field"
            type="email"
            id="dataExportEmail"
            name="export_email"
            placeholder="Email для отправки архива (например, you@mail.com)"
          >
          <button class="action_btn" type="button">Запросить экспорт</button>
        </div>

        <div class="form_group">
          <label for="deleteConfirm">Удаление аккаунта (опасно)</label>
          <input
            class="input_field"
            type="text"
            id="deleteConfirm"
            name="delete_confirm"
            placeholder="Введите DELETE для подтверждения"
            autocomplete="off"
          >
          <button class="action_btn" type="button">Удалить аккаунт</button>
        </div>

        <button class="action_btn" type="submit">Сохранить настройки</button>
      </form>
    </section>
  </div>
</main>
