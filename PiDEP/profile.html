<main>
  <div class="profile_space">
<section class="profile_card">
  <h1 class="profile_title">Личные данные</h1>

  <form class="profile_form" action="#" method="post">
  <div class="form_group">
    <label for="lastname">Фамилия</label>
    <input id="lastname" name="lastname" class="input_field" type="text"
           placeholder="Введите фамилию" required>
  </div>

  <div class="form_group">
    <label for="firstname">Имя</label>
    <input id="firstname" name="firstname" class="input_field" type="text"
           placeholder="Введите имя" required>
  </div>

  <div class="form_group">
    <label for="middlename">Отчество</label>
    <input id="middlename" name="middlename" class="input_field" type="text"
           placeholder="Введите отчество" required>
  </div>

  <div class="form_group">
    <label for="dob">Дата рождения</label>
    <input id="dob" name="dob" class="input_field" type="date" required>
  </div>

  <button class="action_btn" type="submit">Сохранить</button>
</form>

</section>
