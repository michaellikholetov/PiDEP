<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация — PiDEP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <a class="logo" href="index.html">
      <img src="pictures/logo.png" alt="логотип" />
    </a>

    <nav class="left_nav">
      <a class="nav_btn" href="shop.html">Магазин</a>
      <a class="nav_btn" href="sales.html">Акции</a>
    </nav>

    <nav class="right_nav">
      <a class="nav_btn" href="login.html">Войти</a>
      <a class="nav_btn" href="register.html">Регистрация</a>
    </nav>
  </header>

  <main class="auth_page" style="align-items: flex-start; padding-top: 32px;">
    <div class="auth_card" style="max-width:520px;">
      <h1 class="auth_title">Регистрация</h1>
      <p class="auth_subtitle">Создайте аккаунт в PiDEP Casino</p>

      <div id="auth_message" class="auth_message" role="alert"></div>

      <form class="auth_form" id="reg_form" novalidate>

        <div class="form_group">
          <label for="nickname">Никнейм *</label>
          <input
            id="nickname"
            name="nickname"
            type="text"
            class="input_field"
            placeholder="Ваш игровой никнейм"
            autocomplete="username"
          />
          <span class="field_error" id="nickname_err"></span>
        </div>

        <div class="form_group">
          <label for="email">Электронная почта *</label>
          <input
            id="email"
            name="email"
            type="email"
            class="input_field"
            placeholder="example@mail.ru"
            autocomplete="email"
          />
          <span class="field_error" id="email_err"></span>
        </div>

        <div class="form_group">
          <label for="phone">Номер телефона *</label>
          <input
            id="phone"
            name="phone"
            type="tel"
            class="input_field"
            placeholder="+7 (___) ___-__-__"
            autocomplete="tel"
          />
          <span class="phone_hint">Формат: +7 (999) 123-45-67</span>
          <span class="field_error" id="phone_err"></span>
        </div>

        <div class="form_group">
          <label for="password">Пароль *</label>
          <input
            id="password"
            name="password"
            type="password"
            class="input_field"
            placeholder="Минимум 6 символов"
            autocomplete="new-password"
          />
          <span class="field_error" id="password_err"></span>
        </div>

        <div class="form_group">
          <label for="password2">Подтверждение пароля *</label>
          <input
            id="password2"
            name="password2"
            type="password"
            class="input_field"
            placeholder="Повторите пароль"
            autocomplete="new-password"
          />
          <span class="field_error" id="password2_err"></span>
        </div>

        <div class="form_group">
          <label for="birth_date">Дата рождения * (вам должно быть 18+)</label>
          <input
            id="birth_date"
            name="birth_date"
            type="date"
            class="input_field"
          />
          <span class="field_error" id="birth_date_err"></span>
        </div>

        <label class="checkbox_group">
          <input type="checkbox" id="agree_terms" />
          <span>Я принимаю <a href="agreement.html" target="_blank">пользовательское соглашение</a></span>
        </label>
        <span class="field_error" id="agree_terms_err"></span>

        <label class="checkbox_group">
          <input type="checkbox" id="agree_privacy" />
          <span>Я принимаю <a href="privacy.html" target="_blank">политику приватности</a></span>
        </label>
        <span class="field_error" id="agree_privacy_err"></span>

        <button type="submit" class="action_btn">Зарегистрироваться</button>

        <p class="auth_link">
          Уже есть аккаунт? <a href="login.html">Войти</a>
        </p>

      </form>
    </div>
  </main>

  <footer class="site_footer">
    <div class="footer_container">
      <div class="footer_column">
        <h4>Информация</h4>
        <a href="faq.html" class="footer_link" target="_blank">FAQ (Частые вопросы)</a>
        <a href="agreement.html" class="footer_link" target="_blank">Пользовательское соглашение</a>
      </div>
      <div class="footer_column">
        <h4>Контакты</h4>
        <a href="https://t.me/LikholetovMichael" target="_blank" class="footer_link">Telegram DM</a>
        <a href="mailto:michaellikholetov@gmail.com" class="footer_link">michaellikholetov@gmail.com</a>
        <a href="tel:+79217400069" class="footer_link">+7 (921) 740 00 69</a>
      </div>
    </div>
  </footer>

  <script>
    /* ── Phone mask ───────────────────────────────────────── */
    var phoneInput = document.getElementById('phone');

    phoneInput.addEventListener('input', function () {
      var raw = this.value.replace(/\D/g, '');
      if (raw.startsWith('8')) raw = '7' + raw.slice(1);
      if (raw.length > 0 && !raw.startsWith('7')) raw = '7' + raw;

      var digits = raw.slice(1);
      var result = '+7';

      if (digits.length > 0) result += ' (' + digits.slice(0, 3);
      if (digits.length >= 3) result += ') ' + digits.slice(3, 6);
      if (digits.length >= 6) result += '-' + digits.slice(6, 8);
      if (digits.length >= 8) result += '-' + digits.slice(8, 10);

      this.value = result;
    });

    phoneInput.addEventListener('keydown', function (e) {
      if (e.key === 'Backspace' && this.value === '+7') {
        e.preventDefault();
      }
    });

    /* ── Helpers ──────────────────────────────────────────── */
    var form      = document.getElementById('reg_form');
    var msgBox    = document.getElementById('auth_message');

    function showMsg(text, type) {
      msgBox.textContent = text;
      msgBox.className   = 'auth_message ' + type;
    }

    function setErr(inputId, errId, msg) {
      var input = inputId ? document.getElementById(inputId) : null;
      var err   = document.getElementById(errId);
      if (msg) {
        if (input) input.classList.add('error');
        err.textContent = msg;
        err.classList.add('visible');
      } else {
        if (input) input.classList.remove('error');
        err.classList.remove('visible');
      }
    }

    function isValidEmail(v) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    }

    function isValidPhone(v) {
      return /^\+7 \(\d{3}\) \d{3}-\d{2}-\d{2}$/.test(v);
    }

    function isAdult(dateStr) {
      var dob  = new Date(dateStr);
      var now  = new Date();
      var diff = now.getFullYear() - dob.getFullYear();
      var m    = now.getMonth() - dob.getMonth();
      if (m < 0 || (m === 0 && now.getDate() < dob.getDate())) diff--;
      return diff >= 18;
    }

    /* ── Validation ───────────────────────────────────────── */
    function validate() {
      var ok = true;

      var nickname  = document.getElementById('nickname').value.trim();
      var email     = document.getElementById('email').value.trim();
      var phone     = document.getElementById('phone').value.trim();
      var password  = document.getElementById('password').value;
      var password2 = document.getElementById('password2').value;
      var birthDate = document.getElementById('birth_date').value;
      var terms     = document.getElementById('agree_terms').checked;
      var privacy   = document.getElementById('agree_privacy').checked;

      // Nickname
      if (nickname.length < 3) {
        setErr('nickname', 'nickname_err', 'Никнейм должен содержать минимум 3 символа');
        ok = false;
      } else if (nickname.length > 30) {
        setErr('nickname', 'nickname_err', 'Никнейм не должен превышать 30 символов');
        ok = false;
      } else {
        setErr('nickname', 'nickname_err', '');
      }

      // Email
      if (!email) {
        setErr('email', 'email_err', 'Введите e-mail');
        ok = false;
      } else if (/[^\x00-\x7F]/.test(email)) {
        setErr('email', 'email_err', 'E-mail должен содержать только латинские символы');
        ok = false;
      } else if (!isValidEmail(email)) {
        setErr('email', 'email_err', 'Введите корректный e-mail');
        ok = false;
      } else {
        setErr('email', 'email_err', '');
      }

      // Phone
      if (!isValidPhone(phone)) {
        setErr('phone', 'phone_err', 'Введите полный номер в формате +7 (999) 123-45-67');
        ok = false;
      } else {
        setErr('phone', 'phone_err', '');
      }

      // Password
      var allowedPassChars = /^[A-Za-z0-9!#$%&'*+/=?^_`{|}~-]+$/;
      var hasLetter  = /[A-Za-z]/.test(password);
      var hasDigit   = /[0-9]/.test(password);
      var hasSpecial = /[!#$%&'*+/=?^_`{|}~-]/.test(password);

      if (!password) {
        setErr('password', 'password_err', 'Введите пароль');
        ok = false;
      } else if (password.length < 6) {
        setErr('password', 'password_err', 'Пароль должен содержать минимум 6 символов');
        ok = false;
      } else if (password.length > 40) {
        setErr('password', 'password_err', 'Пароль не должен превышать 40 символов');
        ok = false;
      } else if (!allowedPassChars.test(password)) {
        setErr('password', 'password_err', "Допустимы только латинские буквы, цифры и символы: ! # $ % & ' * + - / = ? ^ _ ` { | } ~");
        ok = false;
      } else if (!hasLetter) {
        setErr('password', 'password_err', 'Пароль должен содержать хотя бы одну латинскую букву');
        ok = false;
      } else if (!hasDigit) {
        setErr('password', 'password_err', 'Пароль должен содержать хотя бы одну цифру');
        ok = false;
      } else if (!hasSpecial) {
        setErr('password', 'password_err', "Пароль должен содержать хотя бы один специальный символ (! # $ % & ' * + - / = ? ^ _ ` { | } ~)");
        ok = false;
      } else {
        setErr('password', 'password_err', '');
      }

      // Confirm password
      if (!password2) {
        setErr('password2', 'password2_err', 'Повторите пароль');
        ok = false;
      } else if (password !== password2) {
        setErr('password2', 'password2_err', 'Пароли не совпадают');
        ok = false;
      } else {
        setErr('password2', 'password2_err', '');
      }

      // Birth date
      if (!birthDate) {
        setErr('birth_date', 'birth_date_err', 'Введите дату рождения');
        ok = false;
      } else if (!isAdult(birthDate)) {
        setErr('birth_date', 'birth_date_err', 'Вам должно быть не менее 18 лет');
        ok = false;
      } else {
        setErr('birth_date', 'birth_date_err', '');
      }

      // Checkboxes
      if (!terms) {
        setErr(null, 'agree_terms_err', 'Необходимо принять пользовательское соглашение');
        ok = false;
      } else {
        setErr(null, 'agree_terms_err', '');
      }

      if (!privacy) {
        setErr(null, 'agree_privacy_err', 'Необходимо принять политику приватности');
        ok = false;
      } else {
        setErr(null, 'agree_privacy_err', '');
      }

      return ok;
    }

    /* ── Submit ───────────────────────────────────────────── */
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      if (validate()) {
        showMsg('Форма заполнена корректно.', 'success');
      }
    });
  </script>

</body>
</html>
